name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Template Sheet
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Write clasp credentials
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: printf '%s' "$CLASPRC_JSON" > ~/.clasprc.json

      - name: Verify credentials file
        run: |
          echo "File size: $(wc -c < ~/.clasprc.json) bytes"
          echo "Has token key: $(python3 -c "import json,sys; d=json.load(open('/root/.clasprc.json')); print('token' in d)")"

      - run: npm run push
